<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHARMABOBO - Connexion Pharmacie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }
    h1 { color: #1B5E20; text-align: center; font-size: 28px; margin-bottom: 8px; }
    .tagline { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    label { display: block; color: #333; margin-bottom: 6px; font-size: 14px; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus { border-color: #1B5E20; }
    button {
      width: 100%;
      padding: 14px;
      background: #1B5E20;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #2E7D32; }
    .message { text-align: center; margin-top: 16px; font-size: 14px; }
    .erreur { color: #c62828; }
    .succes { color: #1B5E20; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💊 PHARMABOBO</h1>
    <p class="tagline">Espace Pharmacie</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" />
    <label>Mot de passe</label>
    <input type="password" id="motdepasse" placeholder="••••••••" />
    <button onclick="connecter()">Se connecter</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    async function connecter() {
      const email = document.getElementById('email').value.trim();
      const motdepasse = document.getElementById('motdepasse').value.trim();
      const message = document.getElementById('message');

      if (!email || !motdepasse) {
        message.className = 'message erreur';
        message.textContent = 'Veuillez remplir tous les champs.';
        return;
      }

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, motdepasse })
        });
        const data = await response.json();
        if (response.ok) {
          message.className = 'message succes';
          message.textContent = 'Connexion réussie !';
          localStorage.setItem('token', data.token);
          setTimeout(() => window.location.href = '/dashboard.html', 1000);
        } else {
          message.className = 'message erreur';
          message.textContent = data.erreur || 'Erreur de connexion.';
        }
      } catch (err) {
        message.className = 'message erreur';
        message.textContent = 'Erreur de connexion au serveur.';
      }
    }
  </script>
</body>
</html>
