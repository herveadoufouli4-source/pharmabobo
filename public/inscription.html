<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHARMABOBO - Inscription Pharmacie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
    }
    h1 { color: #1B5E20; text-align: center; font-size: 28px; margin-bottom: 8px; }
    .tagline { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
    label { display: block; color: #333; margin-bottom: 6px; font-size: 14px; font-weight: bold; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #1B5E20; }
    button {
      width: 100%;
      padding: 14px;
      background: #1B5E20;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #2E7D32; }
    .message { text-align: center; margin-top: 16px; font-size: 14px; padding: 10px; border-radius: 8px; }
    .erreur { color: #c62828; background: #FFEBEE; }
    .succes { color: #1B5E20; background: #E8F5E9; }
    .login-link { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
    .login-link a { color: #1B5E20; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💊 PHARMABOBO</h1>
    <p class="tagline">Inscription de votre pharmacie</p>

    <label>Nom de la pharmacie</label>
    <input type="text" id="nom" placeholder="Ex: Pharmacie Santé" />

    <label>Adresse</label>
    <input type="text" id="adresse" placeholder="Ex: Avenue Loudun, Bobo-Dioulasso" />

    <label>Numéro de téléphone</label>
    <input type="tel" id="telephone" placeholder="Ex: 0700000001" />

    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" />

    <label>Mot de passe</label>
    <input type="password" id="motdepasse" placeholder="Minimum 6 caractères" />

    <label>Confirmer le mot de passe</label>
    <input type="password" id="confirmer" placeholder="Répétez le mot de passe" />

    <button onclick="inscrire()">S'inscrire</button>

    <div id="message"></div>

    <div class="login-link">
      Déjà inscrit ? <a href="/login.html">Se connecter</a>
    </div>
  </div>

  <script>
    async function inscrire() {
      const nom = document.getElementById('nom').value.trim();
      const adresse = document.getElementById('adresse').value.trim();
      const telephone = document.getElementById('telephone').value.trim();
      const email = document.getElementById('email').value.trim();
      const motdepasse = document.getElementById('motdepasse').value.trim();
      const confirmer = document.getElementById('confirmer').value.trim();
      const message = document.getElementById('message');

      if (!nom || !adresse || !telephone || !email || !motdepasse) {
        message.className = 'message erreur';
        message.textContent = 'Veuillez remplir tous les champs.';
        return;
      }

      if (motdepasse.length < 6) {
        message.className = 'message erreur';
        message.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        return;
      }

      if (motdepasse !== confirmer) {
        message.className = 'message erreur';
        message.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }

      try {
        const response = await fetch('/auth/inscription', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, adresse, telephone, email, motdepasse })
        });
        const data = await response.json();
        if (response.ok) {
          message.className = 'message succes';
          message.textContent = 'Inscription réussie ! Votre compte est en attente de validation.';
          setTimeout(() => window.location.href = '/login.html', 3000);
        } else {
          message.className = 'message erreur';
          message.textContent = data.erreur || 'Erreur lors de l\'inscription.';
        }
      } catch (err) {
        message.className = 'message erreur';
        message.textContent = 'Erreur de connexion au serveur.';
      }
    }
  </script>
</body>
</html>
